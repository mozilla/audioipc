name: Build
env:
  RUST_BACKTRACE: 1

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-14]
        rust: [stable]
        experimental: [false]
        include:
          - os: ubuntu-24.04
            rust: nightly
            experimental: true
          - os: windows-2025
            rust: nightly
            experimental: true
          - os: macos-14
            rust: nightly
            experimental: true

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Install Dependencies (Linux)
      run: sudo apt-get update && sudo apt-get install libdbus-1-dev libpulse-dev pulseaudio
      if: matrix.os == 'ubuntu-24.04'

    - name: Start Sound Server (Linux)
      run: pulseaudio -D --start --exit-idle-time=-1
      if: matrix.os == 'ubuntu-24.04'

    - name: Install virtual audio devices (Windows)
      run: git clone https://github.com/LABSN/sound-ci-helpers && powershell sound-ci-helpers/windows/setup_sound.ps1
      if: matrix.os == 'windows-2025'

    - name: Allow microphone access to all apps (Windows)
      shell: pwsh
      run: |
        New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\AppPrivacy\"
        New-ItemProperty -Path "HKLM:\SOFTWARE\policies\microsoft\windows\appprivacy" -Name "LetAppsAccessMicrophone" -Value "0x00000001"  -PropertyType "dword"
      if: matrix.os == 'windows-2025'

    - name: Install virtual audio devices (macOS)
      if: matrix.os == 'macos-14'
      run: |
        brew install switchaudio-osx
        brew install blackhole-2ch
        sudo kill -9 `pgrep coreaudiod`
        sleep 10
        SwitchAudioSource -s "BlackHole 2ch" -t input
        SwitchAudioSource -s "BlackHole 2ch" -t output

    - name: Install Rust
      run: |
        rustup toolchain install ${{ matrix.rust }} --profile minimal
        rustup component add rustfmt --toolchain ${{ matrix.rust }}
        rustup component add clippy --toolchain ${{ matrix.rust }}

    - name: Check format
      shell: bash
      run: rustup run ${{ matrix.rust }} cargo fmt --all -- --check

    - name: Clippy
      shell: bash
      run: rustup run ${{ matrix.rust }} cargo clippy --all -- -D warnings

    - name: Build
      shell: bash
      run: rustup run ${{ matrix.rust }} cargo build --all

    - name: Test
      shell: bash
      run: rustup run ${{ matrix.rust }} cargo test --all

